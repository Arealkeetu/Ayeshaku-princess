<!DOCTYPE html>
<html>
<head>
  <title>Our Memories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Poppins',sans-serif;
      text-align:center;
      background:linear-gradient(120deg,#ff758c,#ff7eb3);
      color:white;
    }

    .navbar{
      position:sticky;
      top:0;
      width:100%;
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(8px);
      padding:15px;
      z-index:1000;
    }
    .navbar a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:600;
    }
    .navbar a:hover{
      text-decoration:underline;
    }

    h1 {
      font-family:'Great Vibes',cursive;
      font-size:60px;
      margin-top:30px;
    }

    .upload-box{
      border:2px dashed white;
      border-radius:20px;
      padding:35px;
      margin:30px auto;
      width:80%;
      max-width:500px;
      cursor:pointer;
      transition:0.3s;
    }
    .upload-box:hover{
      background:rgba(255,255,255,0.1);
    }

    #fileInput{
      display:none;
    }

    .gallery-container{
      max-width:900px;
      height:500px;
      margin:20px auto;
      padding:15px;
      border-radius:20px;
      background:rgba(255,255,255,0.1);
      overflow-y:auto;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
    }

    .gallery img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:15px;
      cursor:pointer;
      transition:transform 0.3s, box-shadow 0.3s;
    }

    .gallery img:hover{
      transform:scale(1.08);
      box-shadow:0 10px 20px rgba(0,0,0,0.4);
    }

    #popup{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    #popup img{
      max-width:80%;
      max-height:80%;
      border-radius:20px;
    }

    /* DELETE BUTTON */
    .img-wrapper{
      position:relative;
    }

    .delete-btn{
      position:absolute;
      top:6px;
      right:6px;
      background:rgba(0,0,0,0.6);
      color:white;
      border:none;
      border-radius:50%;
      width:28px;
      height:28px;
      cursor:pointer;
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

  </style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="letter.html">Love Letter</a>
  <a href="question.html">Question</a>
</nav>

<h1>Our Memories 📸</h1>

<label class="upload-box" id="dropArea">
  Drop Photo Here or Click to Upload
  <input type="file" id="fileInput" accept="image/*" multiple>
</label>

<div class="gallery-container">
  <div class="gallery" id="gallery"></div>
</div>

<div id="popup" onclick="closeImage()">
  <img id="popupImg">
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const cloudName = "dxyl0aoi0";
const preset = "my-gallery";
const dropArea = document.getElementById("dropArea");

/* Click upload */
dropArea.addEventListener("click", ()=>{
  document.getElementById("fileInput").click();
});

/* File picker upload */
document.getElementById("fileInput").addEventListener("change", ()=>{
  const files = document.getElementById("fileInput").files;
  for(let i=0;i<files.length;i++){
    uploadImage(files[i]);
  }
});

/* Drag over */
dropArea.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropArea.style.background="rgba(255,255,255,0.2)";
});

/* Drag leave */
dropArea.addEventListener("dragleave",()=>{
  dropArea.style.background="";
});

/* Drop */
dropArea.addEventListener("drop",(e)=>{
  e.preventDefault();
  dropArea.style.background="";
  const files=e.dataTransfer.files;

  for(let i=0;i<files.length;i++){
    uploadImage(files[i]);
  }
});

/* Upload image */
async function uploadImage(file){

if(!file) return;

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",preset);

try{

const res=await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,{
method:"POST",
body:formData
});

const data=await res.json();

if(data.secure_url){
addImage(data.secure_url,data.public_id);

/* SAVE TO API */
await fetch("/api/addImage",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
url:data.secure_url,
public_id:data.public_id
})
});
}

}catch(err){
console.error("Upload failed:",err);
alert("Upload failed");
}

}

/* Add image with delete button */
function addImage(url,public_id){

const optimizedUrl=url.replace('/upload/','/upload/w_300,h_300,c_fill,f_auto,q_auto/');

const wrapper=document.createElement("div");
wrapper.className="img-wrapper";

const img=document.createElement("img");
img.src=optimizedUrl;
img.onclick=()=>openImage(url);

const del=document.createElement("button");
del.className="delete-btn";
del.innerHTML="✕";

del.onclick=async(e)=>{
e.stopPropagation();

await fetch("/api/delete",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
url:url,
public_id:public_id
})
});

wrapper.remove();
};

wrapper.appendChild(img);
wrapper.appendChild(del);

document.getElementById("gallery").appendChild(wrapper);

}

/* Load gallery */
async function loadGallery(){

try{

const res=await fetch("/api/loadGallery");
const data=await res.json();

data.images.forEach(img=>{
if(typeof img==="string"){
addImage(img,null);
}else{
addImage(img.url,img.public_id);
}
});

}catch(err){
console.error("Error loading gallery:",err);
}

}

loadGallery();

});

/* Popup */
function openImage(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}

function closeImage(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
