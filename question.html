<!DOCTYPE html>
<html>
<head>
<title>Question - Our Memories</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    text-align:center;
    background:linear-gradient(120deg,#ff758c,#ff7eb3);
    color:white;
}

.navbar{
    background:rgba(0,0,0,0.3);
    padding:15px;
}
.navbar a{
    color:white;
    margin:5px 10px;
    padding:8px 12px;
    text-decoration:none;
    font-weight:600;
    font-size:18px;
    display:inline-block;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px 10px;
    text-align:center;
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:3rem;
    margin-top:40px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:1rem;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
    transition: background 0.3s;
}
button:hover{
    background:rgba(255,255,255,0.4);
}

/* Mobile adjustments */
@media screen and (max-width:480px){
    h1{ font-size:2.2rem; }
    button{ font-size:0.9rem; padding:8px 16px; }
    .navbar a{ font-size:16px; padding:6px 8px; }
}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
<a href="letter.html">Love Letter</a>
<a href="question.html">Question</a>
</div>

<div class="container">
<h1>Do You Love Me? ❤️</h1>
<button onclick="answerYes()">Yes</button>
<button id="noBtn" onclick="answerNo()">No</button>
</div>

<script>
let noCount = 0;

function answerYes(){
    alert("YAYYYYY I LOVE YOUU TOO SAYANGG 💖");
}

function answerNo(){
    noCount++;
    if(noCount >= 6){
        alert("HEY KAMU STOPPPPPPPPPPPPPPPPPPPPPP :((((((");
        noCount = 0; // reset counter
    } else {
        // Move button randomly on small screens
        const btn = document.getElementById("noBtn");
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - 100);
        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }
}
</script>

</body>
</html>
